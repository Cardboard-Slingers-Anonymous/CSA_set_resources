name: Lint

on:
  push:
    branches: ["main", "dante_dev"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check ."
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check ."
